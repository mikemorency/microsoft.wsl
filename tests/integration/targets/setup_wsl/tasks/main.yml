- name: Generate unique test ID
  ansible.builtin.set_fact:
    unique_test_id: "test-{{ lookup('password', '/dev/null chars=ascii_letters,digit length=6') | lower }}"

- name: Ensure wsl
  block:
    - name: Check WSL status
      ansible.windows.win_command: wsl --status
      args:
        output_encoding_override: utf-16
      changed_when: false

  rescue:
    - name: Install wsl
      ansible.windows.win_command: wsl.exe --install --inbox --no-distribution
      args:
        output_encoding_override: utf-16

    - name: Reboot
      ansible.windows.win_reboot: {}

    - name: Update wsl
      ansible.windows.win_command: wsl.exe --update
      args:
        output_encoding_override: utf-16

    - name: Reboot
      ansible.windows.win_reboot: {}

    - name: Install ubuntu
      ansible.windows.win_command: wsl.exe --install Ubuntu --no-launch
      args:
        output_encoding_override: utf-16
